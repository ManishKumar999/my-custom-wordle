<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Wordle</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #121213;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 20px; }
        #grid {
            display: grid;
            grid-template-rows: repeat(6, 60px);
            grid-gap: 5px;
            margin-bottom: 20px;
        }
        .row {
            display: grid;
            grid-template-columns: repeat(5, 60px);
            grid-gap: 5px;
        }
        .tile {
            border: 2px solid #3a3a3c;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .correct { background-color: #538d4e; border-color: #538d4e; }
        .present { background-color: #b59f3b; border-color: #b59f3b; }
        .absent { background-color: #3a3a3c; border-color: #3a3a3c; }
    </style>
</head>
<body>

    <h1>Custom Wordle</h1>
    <div id="grid"></div>
    <p id="message"></p>

    <script>
        // CHANGE THIS TO YOUR SECRET 5-LETTER WORD
        const SECRET_WORD = "SURYA".toUpperCase(); 
        
        const MAX_ATTEMPTS = 6;
        const WORD_LENGTH = 5;
        let attempts = 0;
        let currentGuess = "";
        
        const grid = document.getElementById("grid");
        const message = document.getElementById("message");

        // Initialize grid
        for (let i = 0; i < MAX_ATTEMPTS; i++) {
            let row = document.createElement("div");
            row.className = "row";
            for (let j = 0; j < WORD_LENGTH; j++) {
                let tile = document.createElement("div");
                tile.className = "tile";
                tile.id = `tile-${i}-${j}`;
                row.appendChild(tile);
            }
            grid.appendChild(row);
        }

        // Listen for keyboard input
        document.addEventListener("keydown", (e) => {
            if (attempts >= MAX_ATTEMPTS) return;

            if (e.key === "Enter") {
                if (currentGuess.length === WORD_LENGTH) {
                    checkGuess();
                } else {
                    alert("Not enough letters!");
                }
            } else if (e.key === "Backspace") {
                currentGuess = currentGuess.slice(0, -1);
                updateGrid();
            } else if (/^[a-zA-Z]$/.test(e.key) && currentGuess.length < WORD_LENGTH) {
                currentGuess += e.key.toUpperCase();
                updateGrid();
            }
        });

        function updateGrid() {
            for (let j = 0; j < WORD_LENGTH; j++) {
                let tile = document.getElementById(`tile-${attempts}-${j}`);
                tile.innerText = currentGuess[j] || "";
            }
        }

        function checkGuess() {
            let rowTiles = [];
            let wordCopy = SECRET_WORD;

            // First pass: Mark correct (Green) letters
            for (let j = 0; j < WORD_LENGTH; j++) {
                let tile = document.getElementById(`tile-${attempts}-${j}`);
                if (currentGuess[j] === SECRET_WORD[j]) {
                    tile.classList.add("correct");
                    wordCopy = wordCopy.replace(currentGuess[j], "_");
                }
            }

            // Second pass: Mark present (Yellow) or absent (Gray) letters
            for (let j = 0; j < WORD_LENGTH; j++) {
                let tile = document.getElementById(`tile-${attempts}-${j}`);
                if (!tile.classList.contains("correct")) {
                    if (wordCopy.includes(currentGuess[j])) {
                        tile.classList.add("present");
                        wordCopy = wordCopy.replace(currentGuess[j], "_");
                    } else {
                        tile.classList.add("absent");
                    }
                }
            }

            if (currentGuess === SECRET_WORD) {
                message.innerText = "🎉 You Won!";
                attempts = MAX_ATTEMPTS; // End game
            } else {
                attempts++;
                currentGuess = "";
                if (attempts === MAX_ATTEMPTS) {
                    message.innerText = `Game Over! The word was ${SECRET_WORD}.`;
                }
            }
        }
    </script>
</body>
</html>
