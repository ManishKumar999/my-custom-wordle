<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Wordle</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #121213;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        h1 { margin: 10px 0 5px 0; }
        #hint {
            font-size: 1.1rem;
            color: #b59f3b;
            margin-bottom: 15px;
            font-style: italic;
        }
        #grid {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            grid-gap: 5px;
            margin-bottom: 15px;
        }
        .row {
            display: grid;
            /* Updated to 6 columns for REVOLT */
            grid-template-columns: repeat(6, 1fr); 
            grid-gap: 5px;
        }
        .tile {
            width: 50px;
            height: 50px;
            border: 2px solid #3a3a3c;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            box-sizing: border-box;
        }
        .correct { background-color: #538d4e; border-color: #538d4e; }
        .present { background-color: #b59f3b; border-color: #b59f3b; }
        .absent { background-color: #3a3a3c; border-color: #3a3a3c; }
        
        #message {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 10px 0;
            text-align: center;
            max-width: 90%;
            min-height: 2.5em;
        }

        /* Virtual Keyboard Styling for Mobile */
        #keyboard {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: auto;
            padding-bottom: 10px;
        }
        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 4px;
            width: 100%;
        }
        .key {
            background-color: #818384;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
            padding: 0;
            height: 55px;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }
        .key-wide {
            flex: 1.5;
            font-size: 0.85rem;
        }
        .key:active {
            background-color: #6a6b6c;
        }

        /* Adjust tile size on smaller screens */
        @media (max-width: 400px) {
            .tile {
                width: 42px;
                height: 42px;
                font-size: 1.5rem;
            }
            .key {
                height: 48px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <h1>Custom Wordle</h1>
    <p id="hint">💡 Hint: Rising up against authority</p>
    
    <div id="grid"></div>
    <p id="message"></p>

    <!-- Virtual On-Screen Keyboard -->
    <div id="keyboard">
        <div class="keyboard-row">
            <button class="key" data-key="Q">Q</button>
            <button class="key" data-key="W">W</button>
            <button class="key" data-key="E">E</button>
            <button class="key" data-key="R">R</button>
            <button class="key" data-key="T">T</button>
            <button class="key" data-key="Y">Y</button>
            <button class="key" data-key="U">U</button>
            <button class="key" data-key="I">I</button>
            <button class="key" data-key="O">O</button>
            <button class="key" data-key="P">P</button>
        </div>
        <div class="keyboard-row">
            <button class="key" data-key="A">A</button>
            <button class="key" data-key="S">S</button>
            <button class="key" data-key="D">D</button>
            <button class="key" data-key="F">F</button>
            <button class="key" data-key="G">G</button>
            <button class="key" data-key="H">H</button>
            <button class="key" data-key="J">J</button>
            <button class="key" data-key="K">K</button>
            <button class="key" data-key="L">L</button>
        </div>
        <div class="keyboard-row">
            <button class="key key-wide" data-key="ENTER">ENTER</button>
            <button class="key" data-key="Z">Z</button>
            <button class="key" data-key="X">X</button>
            <button class="key" data-key="C">C</button>
            <button class="key" data-key="V">V</button>
            <button class="key" data-key="B">B</button>
            <button class="key" data-key="N">N</button>
            <button class="key" data-key="M">M</button>
            <button class="key key-wide" data-key="BACKSPACE">⌫</button>
        </div>
    </div>

    <script>
        const SECRET_WORD = "REVOLT"; 
        const MAX_ATTEMPTS = 6;
        const WORD_LENGTH = 6; 
        let attempts = 0;
        let currentGuess = "";
        
        const grid = document.getElementById("grid");
        const message = document.getElementById("message");

        // Initialize grid
        for (let i = 0; i < MAX_ATTEMPTS; i++) {
            let row = document.createElement("div");
            row.className = "row";
            for (let j = 0; j < WORD_LENGTH; j++) {
                let tile = document.createElement("div");
                tile.className = "tile";
                tile.id = `tile-${i}-${j}`;
                row.appendChild(tile);
            }
            grid.appendChild(row);
        }

        // Handle key presses (Unified for physical and virtual keyboard)
        function handleInput(key) {
            if (attempts >= MAX_ATTEMPTS) return;

            if (key === "ENTER") {
                if (currentGuess.length === WORD_LENGTH) {
                    checkGuess();
                } else {
                    alert("Not enough letters!");
                }
            } else if (key === "BACKSPACE") {
                currentGuess = currentGuess.slice(0, -1);
                updateGrid();
            } else if (/^[A-Z]$/.test(key) && currentGuess.length < WORD_LENGTH) {
                currentGuess += key;
                updateGrid();
            }
        }

        // Listen for physical keyboard input
        document.addEventListener("keydown", (e) => {
            let key = e.key.toUpperCase();
            if (key === "ENTER" || key === "BACKSPACE" || /^[A-Z]$/.test(key)) {
                handleInput(key);
            }
        });

        // Listen for virtual keyboard taps
        document.getElementById("keyboard").addEventListener("click", (e) => {
            const target = e.target.closest(".key");
            if (target) {
                const key = target.getAttribute("data-key");
                handleInput(key);
            }
        });

        function updateGrid() {
            for (let j = 0; j < WORD_LENGTH; j++) {
                let tile = document.getElementById(`tile-${attempts}-${j}`);
                tile.innerText = currentGuess[j] || "";
            }
        }

        function checkGuess() {
            let wordCopy = SECRET_WORD;

            // First pass: Mark correct (Green) letters
            for (let j = 0; j < WORD_LENGTH; j++) {
                let tile = document.getElementById(`tile-${attempts}-${j}`);
                if (currentGuess[j] === SECRET_WORD[j]) {
                    tile.classList.add("correct");
                    wordCopy = wordCopy.replace(currentGuess[j], "_");
                }
            }

            // Second pass: Mark present (Yellow) or absent (Gray) letters
            for (let j = 0; j < WORD_LENGTH; j++) {
                let tile = document.getElementById(`tile-${attempts}-${j}`);
                if (!tile.classList.contains("correct")) {
                    if (wordCopy.includes(currentGuess[j])) {
                        tile.classList.add("present");
                        wordCopy = wordCopy.replace(currentGuess[j], "_");
                    } else {
                        tile.classList.add("absent");
                    }
                }
            }

            if (currentGuess === SECRET_WORD) {
                message.innerHTML = "🎉 <b>You Won!</b><br>Great job guessing REVOLT!";
                attempts = MAX_ATTEMPTS; // End game
            } else {
                attempts++;
                currentGuess = "";
                if (attempts === MAX_ATTEMPTS) {
                    message.innerHTML = `❌ <b>Game Over!</b><br>The word was <b>${SECRET_WORD}</b>.`;
                }
            }
        }
    </script>
</body>
</html>
