<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Wordle</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #121213;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 5px; }
        #hint {
            font-size: 1.1rem;
            color: #b59f3b;
            margin-bottom: 20px;
            font-style: italic;
        }
        #grid {
            display: grid;
            grid-template-rows: repeat(6, 60px);
            grid-gap: 5px;
            margin-bottom: 20px;
        }
        .row {
            display: grid;
            /* UPDATED: Changed columns to 7 to support "CHAAPLI" */
            grid-template-columns: repeat(7, 60px); 
            grid-gap: 5px;
        }
        .tile {
            border: 2px solid #3a3a3c;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .correct { background-color: #538d4e; border-color: #538d4e; }
        .present { background-color: #b59f3b; border-color: #b59f3b; }
        .absent { background-color: #3a3a3c; border-color: #3a3a3c; }
        #message {
            font-size: 1.4rem;
            font-weight: bold;
            margin-top: 15px;
            text-align: center;
            max-width: 80%;
        }
    </style>
</head>
<body>

    <h1>Custom Wordle</h1>
    <!-- ADDED: Hint for the players -->
    <p id="hint">💡 Hint: A classic Gujarati slang word for someone who interferes or acts overly smart! 😉</p>
    
    <div id="grid"></div>
    <p id="message"></p>

    <script>
        // UPDATED: Secret word changed to CHAAPLI
        const SECRET_WORD = "Chaapli".toUpperCase(); 
        
        const MAX_ATTEMPTS = 6;
        // UPDATED: Length set to 7
        const WORD_LENGTH = 7; 
        let attempts = 0;
        let currentGuess = "";
        
        const grid = document.getElementById("grid");
        const message = document.getElementById("message");

        // Initialize grid
        for (let i = 0; i < MAX_ATTEMPTS; i++) {
            let row = document.createElement("div");
            row.className = "row";
            for (let j = 0; j < WORD_LENGTH; j++) {
                let tile = document.createElement("div");
                tile.className = "tile";
                tile.id = `tile-${i}-${j}`;
                row.appendChild(tile);
            }
            grid.appendChild(row);
        }

        // Listen for keyboard input
        document.addEventListener("keydown", (e) => {
            if (attempts >= MAX_ATTEMPTS) return;

            if (e.key === "Enter") {
                if (currentGuess.length === WORD_LENGTH) {
                    checkGuess();
                } else {
                    alert("Not enough letters!");
                }
            } else if (e.key === "Backspace") {
                currentGuess = currentGuess.slice(0, -1);
                updateGrid();
            } else if (/^[a-zA-Z]$/.test(e.key) && currentGuess.length < WORD_LENGTH) {
                currentGuess += e.key.toUpperCase();
                updateGrid();
            }
        });

        function updateGrid() {
            for (let j = 0; j < WORD_LENGTH; j++) {
                let tile = document.getElementById(`tile-${attempts}-${j}`);
                tile.innerText = currentGuess[j] || "";
            }
        }

        function checkGuess() {
            let wordCopy = SECRET_WORD;

            // First pass: Mark correct (Green) letters
            for (let j = 0; j < WORD_LENGTH; j++) {
                let tile = document.getElementById(`tile-${attempts}-${j}`);
                if (currentGuess[j] === SECRET_WORD[j]) {
                    tile.classList.add("correct");
                    wordCopy = wordCopy.replace(currentGuess[j], "_");
                }
            }

            // Second pass: Mark present (Yellow) or absent (Gray) letters
            for (let j = 0; j < WORD_LENGTH; j++) {
                let tile = document.getElementById(`tile-${attempts}-${j}`);
                if (!tile.classList.contains("correct")) {
                    if (wordCopy.includes(currentGuess[j])) {
                        tile.classList.add("present");
                        wordCopy = wordCopy.replace(currentGuess[j], "_");
                    } else {
                        tile.classList.add("absent");
                    }
                }
            }

            // UPDATED: Added funny Gujarati win/loss messages
            if (currentGuess === SECRET_WORD) {
                message.innerHTML = "🎉 <b>You Won!</b><br>Kharekhar, tame toh ek number na <b>Chaapli</b> chho! Badhi khabar pade chhe emne! Have Fafda-Jalebi mangavo jaldi! 😋";
                attempts = MAX_ATTEMPTS; // End game
            } else {
                attempts++;
                currentGuess = "";
                if (attempts === MAX_ATTEMPTS) {
                    message.innerHTML = `❌ <b>Game Over!</b><br>Arey bhura/bhuri! Tame toh sacha Gujarati nathi! The word was <b>${SECRET_WORD}</b>. Have Khakhra khai ne sui jao! 😴`;
                }
            }
        }
    </script>
</body>
</html>
